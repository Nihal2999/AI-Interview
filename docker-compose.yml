version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: interviewer_db
    restart: always
    environment:
      POSTGRES_USER: interviewer
      POSTGRES_PASSWORD: interviewer123
      POSTGRES_DB: interviewerdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: interviewer_backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
